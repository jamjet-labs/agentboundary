name: Release

# Triggers on annotated/lightweight tags matching v0.1.0, v1.2.3, v0.1.0-rc1, etc.
# Push the tag from a clean main: `git tag -a v0.1.0 -m "..." && git push origin v0.1.0`.
#
# Setup (one-time, on PyPI side):
#   1. Go to https://pypi.org/manage/account/publishing/
#   2. Add a "trusted publisher" with:
#        Owner: jamjet-labs
#        Repository: agentboundary
#        Workflow: release.yml
#        Environment: pypi
#   This grants short-lived OIDC tokens to this workflow; no PYPI_TOKEN
#   secret to manage or rotate.
#
# npm publishing is intentionally NOT wired here. The first publish of the
# `agentboundary` npm package bootstraps the trusted-publisher relationship
# on the npm registry; once an automated workflow takes over, document it
# here. Until then, run `npm publish --access public` from `npm/` manually.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        # No cache: agentboundary uses hatch, not uv, so there is no uv.lock
        # for the cache key to glob against. Tag publishes run once;
        # cache savings are negligible.

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION="$(uv run python -c 'import tomllib; print(tomllib.loads(open("pyproject.toml","rb").read().decode())["project"]["version"])')"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match pyproject.toml version $PKG_VERSION"
            exit 1
          fi
          echo "Tag and pyproject version both: $TAG_VERSION"

      - name: Build wheel + sdist
        run: uv build

      - name: Verify wheel content (10 scenarios + schema + meta-schema)
        run: |
          WHEEL=$(ls dist/agentboundary-*.whl)
          unzip -l "$WHEEL"
          SCENARIO_COUNT=$(unzip -l "$WHEEL" | grep -c "_data/scenarios/.*\.yaml$" || true)
          if [ "$SCENARIO_COUNT" -ne 10 ]; then
            echo "::error::Wheel must bundle exactly 10 scenarios, found $SCENARIO_COUNT"
            exit 1
          fi
          unzip -l "$WHEEL" | grep -q "_data/action-receipt-v0.1.json" || (echo "::error::Wheel missing main schema"; exit 1)
          unzip -l "$WHEEL" | grep -q "scenarios/_meta-schema.json" || (echo "::error::Wheel missing meta-schema"; exit 1)
          echo "Wheel content verified."

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          retention-days: 30

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-24.04
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/p/agentboundary
    permissions:
      # Required for OIDC trusted publishing; short-lived token, no secrets.
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No `with: password:` — uses OIDC trusted publisher.

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout (for release notes)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for auto-generated notes

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
          # Mark pre-releases (e.g. v1.0.0-rc1) automatically.
          prerelease: ${{ contains(github.ref_name, '-') }}
