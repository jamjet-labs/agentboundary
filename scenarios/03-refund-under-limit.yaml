name: 03-refund-under-limit
description: |
  Stripe refund of $42 under an auto-approve $100 limit. Allow with no approval needed.
setup:
  policies:
    - name: acme.refunds
      version: "1"
      rule: allow
      capabilities: [stripe.refund]
      limit:
        field: amount_cents
        max: 10000
action:
  actor: { type: agent, id: "agent:support-bot:session/demo" }
  agent:
    framework: openai-agents
    framework_version: "0.1.0"
    model: gpt-4o-mini
    model_version: "2024-07-18"
  tool: { name: stripe, version: "12.0.0", capability: stripe.refund }
  target:
    system: stripe.com
    environment: prod
    resource_id: charge/ch_abc123
  arguments: { charge_id: "ch_abc123", amount_cents: 4200, reason: "duplicate" }
expect:
  decision: allow
  conformance_level: 3
  receipt_must_validate: true
