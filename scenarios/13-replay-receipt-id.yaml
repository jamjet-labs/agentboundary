name: 13-replay-receipt-id
description: |
  Receipt is well-formed but its receipt_id has been observed before. Level
  4 catches the replay — an attacker who captures a valid Action Receipt
  cannot resubmit it to make a verifier think the action happened twice.
setup:
  policies:
    - name: agentboundary.repo.merges
      version: "2"
      rule: allow
      capabilities: [github.merge]
  seed_receipt_id: "0192c8d0-1f2a-7c3e-bf2a-1a4d3f5e6c7b"
  prior_receipt_ids:
    - "0192c8d0-1f2a-7c3e-bf2a-1a4d3f5e6c7b"
action:
  actor: { type: agent, id: "agent:claude-code:session/demo" }
  agent:
    framework: claude-code
    framework_version: "2.4.1"
    model: claude-opus-4-7
    model_version: "20260101"
  tool: { name: github-mcp, version: "0.7.0", capability: github.merge }
  target:
    system: github.com/jamjet-labs/agentboundary
    environment: prod
    resource_id: pull/14
  arguments: { ref: refs/heads/main, sha: b1c2d3e4 }
expect:
  decision: allow
  conformance_level: 4
  receipt_must_validate: true
  failures_must_include: ["LEVEL_4_RECEIPT_ID_REPLAY"]
