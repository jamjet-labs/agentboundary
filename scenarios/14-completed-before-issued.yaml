name: 14-completed-before-issued
description: |
  Receipt declares execution.completed_at strictly before issued_at — an
  impossible timeline if the receipt was emitted after the action ran.
  ``recompute_hash`` makes the mutated receipt internally consistent, so
  Level 3 hashes still verify and Level 4 catches the planted lie on its
  own merits.
setup:
  policies:
    - name: agentboundary.repo.merges
      version: "2"
      rule: allow
      capabilities: [github.merge]
action:
  actor: { type: agent, id: "agent:claude-code:session/demo" }
  agent:
    framework: claude-code
    framework_version: "2.4.1"
    model: claude-opus-4-7
    model_version: "20260101"
  tool: { name: github-mcp, version: "0.7.0", capability: github.merge }
  target:
    system: github.com/jamjet-labs/agentboundary
    environment: prod
    resource_id: pull/14
  arguments: { ref: refs/heads/main, sha: b1c2d3e4 }
  inject:
    - op: mutate_field
      path: execution.completed_at
      value: "2020-01-01T00:00:00Z"
      recompute_hash: true
expect:
  decision: allow
  conformance_level: 4
  receipt_must_validate: true
  failures_must_include: ["LEVEL_4_COMPLETED_BEFORE_ISSUED"]
