name: 15-policy-version-downgrade
description: |
  Receipt is well-formed and internally consistent, but its policy.version
  has been swapped post-emission to a value the verifier's policy store
  does not recognise. Spec §5.4 mandates Level 4 reject the receipt:
  ``policy-downgrade defense.``
setup:
  policies:
    - name: agentboundary.repo.merges
      version: "2"
      rule: allow
      capabilities: [github.merge]
action:
  actor: { type: agent, id: "agent:claude-code:session/demo" }
  agent:
    framework: claude-code
    framework_version: "2.4.1"
    model: claude-opus-4-7
    model_version: "20260101"
  tool: { name: github-mcp, version: "0.7.0", capability: github.merge }
  target:
    system: github.com/jamjet-labs/agentboundary
    environment: prod
    resource_id: pull/14
  arguments: { ref: refs/heads/main, sha: b1c2d3e4 }
  inject:
    - op: mutate_field
      path: policy.version
      value: "1"
      recompute_hash: true
expect:
  decision: allow
  conformance_level: 4
  receipt_must_validate: true
  failures_must_include: ["LEVEL_4_POLICY_DOWNGRADE"]
