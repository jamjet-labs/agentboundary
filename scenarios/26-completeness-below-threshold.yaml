name: 26-completeness-below-threshold
description: |
  v0.2-alpha receipt with an empty provenance map — every applicable
  field is treated as synthesized, so the recomputed completeness_score
  is 0.0. The verifier supplies minimum_completeness=0.5, so Level 4
  fires LEVEL_4_COMPLETENESS_BELOW_THRESHOLD.

  Demonstrates the threshold check: an auditor can reject receipts that
  fail to meet a quality bar even when the receipt itself is structurally
  valid and tamper-evidence holds.
setup:
  policies:
    - name: agentboundary.repo.merges
      version: "2"
      rule: allow
      capabilities: [github.merge]
  minimum_completeness: 0.5
action:
  actor: { type: agent, id: "agent:claude-code:session/demo" }
  agent:
    framework: claude-code
    framework_version: "2.4.1"
    model: claude-opus-4-7
    model_version: "20260101"
  tool: { name: github-mcp, version: "0.7.0", capability: github.merge }
  target:
    system: github.com/jamjet-labs/agentboundary
    environment: prod
    resource_id: pull/14
  arguments: { ref: refs/heads/main, sha: b1c2d3e4 }
  inject:
    - { op: mutate_field, path: version, value: "agentboundary/v0.2-alpha" }
    - { op: mutate_field, path: provenance, value: {} }
    - { op: mutate_field, path: completeness_score, value: 0.0, recompute_hash: true }
expect:
  decision: allow
  conformance_level: 4
  receipt_must_validate: true
  failures_must_include: ["LEVEL_4_COMPLETENESS_BELOW_THRESHOLD"]
