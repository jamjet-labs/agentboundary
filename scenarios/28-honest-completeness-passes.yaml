name: 28-honest-completeness-passes
description: |
  Positive boundary for v0.2-alpha. Receipt opts in to v0.2-alpha with a
  fully-observed provenance map (all 17 required paths marked observed,
  score=1.0). No verifier minimum supplied. Level 4 must NOT fire either
  the mismatch nor the threshold check.

  Proves the score recomputation accepts an honest emitter cleanly.
setup:
  policies:
    - name: agentboundary.repo.merges
      version: "2"
      rule: allow
      capabilities: [github.merge]
action:
  actor: { type: agent, id: "agent:claude-code:session/demo" }
  agent:
    framework: claude-code
    framework_version: "2.4.1"
    model: claude-opus-4-7
    model_version: "20260101"
  tool: { name: github-mcp, version: "0.7.0", capability: github.merge }
  target:
    system: github.com/jamjet-labs/agentboundary
    environment: prod
    resource_id: pull/14
  arguments: { ref: refs/heads/main, sha: b1c2d3e4 }
  inject:
    - { op: mutate_field, path: version, value: "agentboundary/v0.2-alpha" }
    - op: mutate_field
      path: provenance
      value:
        receipt_id: observed
        issued_at: observed
        actor.type: observed
        actor.id: observed
        agent.framework: observed
        agent.framework_version: observed
        agent.model: observed
        agent.model_version: observed
        tool.name: observed
        tool.version: observed
        tool.capability: observed
        target.system: observed
        target.environment: observed
        target.resource_id: observed
        arguments_hash: observed
        policy.name: observed
        policy.version: observed
        policy.decision: observed
        execution.status: observed
        execution.completed_at: observed
        execution.result_ref: observed
    - { op: mutate_field, path: completeness_score, value: 1.0, recompute_hash: true }
expect:
  decision: allow
  conformance_level: 4
  receipt_must_validate: true
