name: 30-broken-chain-fires
description: |
  v0.2-alpha receipt claims to chain back to a prior receipt whose hash
  does not match the verifier's records. LEVEL_4_BROKEN_CHAIN fires.

  Demonstrates within-emitter tamper detection: a forger who deletes a
  receipt from the middle of a stream and rewrites the next one's
  prior_receipt link must also know and supply the correct prior hash —
  which the verifier's records contradict.
setup:
  policies:
    - name: agentboundary.repo.merges
      version: "2"
      rule: allow
      capabilities: [github.merge]
  prior_receipt_hashes:
    "0192c8d0-1f2a-7c3e-bf2a-aaaaaaaaaaaa": "1111111111111111111111111111111111111111111111111111111111111111"
action:
  actor: { type: agent, id: "agent:claude-code:session/demo" }
  agent:
    framework: claude-code
    framework_version: "2.4.1"
    model: claude-opus-4-7
    model_version: "20260101"
  tool: { name: github-mcp, version: "0.7.0", capability: github.merge }
  target:
    system: github.com/jamjet-labs/agentboundary
    environment: prod
    resource_id: pull/14
  arguments: { ref: refs/heads/main, sha: b1c2d3e4 }
  inject:
    - { op: mutate_field, path: version, value: "agentboundary/v0.2-alpha" }
    - op: mutate_field
      path: prior_receipt
      value:
        receipt_id: "0192c8d0-1f2a-7c3e-bf2a-aaaaaaaaaaaa"
        receipt_hash: "deadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeef"
      recompute_hash: true
expect:
  decision: allow
  conformance_level: 4
  receipt_must_validate: true
  failures_must_include: ["LEVEL_4_BROKEN_CHAIN"]
