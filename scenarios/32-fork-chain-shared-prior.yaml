name: 32-fork-chain-shared-prior
description: |
  Spec §2.0 permits forking: two receipts can name the same prior_receipt.
  This scenario shows one branch of such a fork — the verifier's
  prior_receipt_hashes contains the shared ancestor; the chain check
  passes cleanly. Fork-resolution policy is verifier-side, not spec-side.
setup:
  policies:
    - name: agentboundary.repo.merges
      version: "2"
      rule: allow
      capabilities: [github.merge]
  prior_receipt_hashes:
    "0192c8d0-1f2a-7c3e-bf2a-5ec0eddedfa1": "5555555555555555555555555555555555555555555555555555555555555555"
action:
  actor: { type: agent, id: "agent:claude-code:session/demo" }
  agent:
    framework: claude-code
    framework_version: "2.4.1"
    model: claude-opus-4-7
    model_version: "20260101"
  tool: { name: github-mcp, version: "0.7.0", capability: github.merge }
  target:
    system: github.com/jamjet-labs/agentboundary
    environment: prod
    resource_id: pull/15
  arguments: { ref: refs/heads/main, sha: f00bba12 }
  inject:
    - { op: mutate_field, path: version, value: "agentboundary/v0.2-alpha" }
    - op: mutate_field
      path: prior_receipt
      value:
        receipt_id: "0192c8d0-1f2a-7c3e-bf2a-5ec0eddedfa1"
        receipt_hash: "5555555555555555555555555555555555555555555555555555555555555555"
      recompute_hash: true
expect:
  decision: allow
  conformance_level: 4
  receipt_must_validate: true
