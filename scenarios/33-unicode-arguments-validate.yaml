name: 33-unicode-arguments-validate
description: |
  Arguments object contains non-ASCII unicode strings (CJK, emoji,
  combining marks). Canonical-JSON UTF-8 encoding must be stable so the
  arguments_hash recomputes identically across implementations.
setup:
  policies:
    - name: agentboundary.repo.merges
      version: "2"
      rule: allow
      capabilities: [github.issues.create]
action:
  actor: { type: agent, id: "agent:claude-code:session/demo" }
  agent:
    framework: claude-code
    framework_version: "2.4.1"
    model: claude-opus-4-7
    model_version: "20260101"
  tool: { name: github-rest, version: "2022-11-28", capability: github.issues.create }
  target:
    system: github.com/jamjet-labs/agentboundary
    environment: prod
    resource_id: jamjet-labs/agentboundary
  arguments:
    title: "北京 · München · São Paulo \U0001F525"
    body: "Combining marks: café — naïve — résumé. CJK: 行政区. Emoji: 🎯🔒🛡️"
    labels: ["i18n", "encoding-edge-case"]
expect:
  decision: allow
  conformance_level: 3
  receipt_must_validate: true
